name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish, for example v0.1.0
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-bundles:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact_name: bundles-windows
          - platform: ubuntu-22.04
            artifact_name: bundles-linux
          - platform: macos-latest
            artifact_name: bundles-macos

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: telegram-drive/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            telegram-drive -> target

      - name: Install NPM dependencies
        working-directory: telegram-drive
        run: npm ci

      - name: Security UI check
        working-directory: telegram-drive
        run: npm run check:security-ui

      - name: Sync application version from tag
        working-directory: telegram-drive
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: npm run sync:version -- ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

      - name: Build Tauri bundles
        working-directory: telegram-drive
        run: npm run build:desktop

      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            telegram-drive/src-tauri/target/release/bundle/**/*.msi
            telegram-drive/src-tauri/target/release/bundle/**/*.exe
            telegram-drive/src-tauri/target/release/bundle/**/*.deb
            telegram-drive/src-tauri/target/release/bundle/**/*.AppImage
            telegram-drive/src-tauri/target/release/bundle/**/*.rpm
            telegram-drive/src-tauri/target/release/bundle/**/*.dmg
            telegram-drive/src-tauri/target/release/bundle/**/*.app.tar.gz
            telegram-drive/src-tauri/target/release/bundle/**/*.tar.gz
            telegram-drive/src-tauri/target/release/bundle/**/*.zip
            telegram-drive/src-tauri/target/release/bundle/**/*.sig

  publish-release:
    needs: build-bundles
    runs-on: ubuntu-22.04

    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release with installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: Savedrive ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/**/*.msi
            release-artifacts/**/*.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.rpm
            release-artifacts/**/*.dmg
            release-artifacts/**/*.app.tar.gz
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
            release-artifacts/**/*.sig
